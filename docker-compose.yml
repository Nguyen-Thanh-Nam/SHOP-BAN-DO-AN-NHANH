# ================================================================
# Hardened Docker Compose - SHOP-BAN-DO-AN-NHANH
# Security improvements:
#   1. Resource limits (ngăn DoS/container breakout)
#   2. read_only filesystem (ngăn ghi file độc hại)
#   3. no-new-privileges (ngăn privilege escalation)
#   4. Loại bỏ Linux capabilities không cần thiết
#   5. Secrets qua environment (không hardcode trong compose)
#   6. Healthcheck đầy đủ
#   7. Network isolation (backend không expose ra ngoài)
# ================================================================

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: shopgaran_backend
    restart: unless-stopped
    ports:
      # ✅ Chỉ expose trên localhost — không expose ra internet
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}        # ✅ Đọc từ .env — không hardcode
      - DB_NAME=${DB_NAME:-popeyes_clone}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}    # ✅ Từ .env
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}  # ✅ Từ .env
      - JWT_ACCESS_EXPIRE=${JWT_ACCESS_EXPIRE:-1h}
      - JWT_REFRESH_EXPIRE=${JWT_REFRESH_EXPIRE:-7d}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}            # ✅ Từ .env — không hardcode
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy     # ✅ Chờ DB healthy thực sự
    networks:
      - shop_internal                   # ✅ Giao tiếp nội bộ với DB
      - shop_public                     # ✅ Để có thể expose port 4000 cho frontend (trình duyệt) gọi API
    # ================================================================
    # Security options
    # ================================================================
    security_opt:
      - no-new-privileges:true          # ✅ Ngăn privilege escalation
    cap_drop:
      - ALL                             # ✅ Loại bỏ toàn bộ capabilities
    cap_add:
      - NET_BIND_SERVICE                # ✅ Chỉ giữ capability cần thiết
    read_only: false                    # uploads/ cần write — bật nếu dùng cloud storage
    # ================================================================
    # Resource limits (ngăn DoS)
    # ================================================================
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # ================================================================
    # Labels
    # ================================================================
    labels:
      - "security.scanned=true"
      - "security.tool=trivy"
      - "git.branch=${CI_COMMIT_REF_NAME:-local}"
      - "com.project.name=shopbandoannhanh-backend"
    volumes:
      - backend_uploads:/app/uploads
    # ================================================================
    # Healthcheck
    # ================================================================
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        - BUILDKIT_INLINE_CACHE=1
    container_name: shopgaran_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"                     # Frontend expose public
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      - NEXT_TELEMETRY_DISABLED=1       # ✅ Không gửi telemetry
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shop_internal
      - shop_public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - "security.scanned=true"
      - "com.project.name=shopbandoannhanh-frontend"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --local-infile=0
      --secure-file-priv=/var/lib/mysql
    container_name: shopgaran_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}          # ✅ Từ .env
      MYSQL_DATABASE: ${DB_NAME:-popeyes_clone}
      MYSQL_ROOT_HOST: '%'
    ports:
      # ✅ Database chỉ expose trên localhost — không public
      - "127.0.0.1:3306:3306"
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql:ro   # ✅ Read-only init
      - db_data:/var/lib/mysql
    networks:
      - shop_internal                   # ✅ DB chỉ trong internal network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    labels:
      - "security.encrypted=true"
      - "com.project.name=shopbandoannhanh-mysql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

# ================================================================
# Networks
# ================================================================
networks:
  shop_internal:
    driver: bridge
    # Internal network — không kết nối internet
    internal: true
    labels:
      - "security.network=internal"

  shop_public:
    driver: bridge
    labels:
      - "security.network=public"

# ================================================================
# Volumes
# ================================================================
volumes:
  db_data:
    driver: local
    labels:
      - "security.encrypted=false"
      - "backup.required=true"
  backend_uploads:
    driver: local
    labels:
      - "backup.required=true"
