# ================================================================
# GitLab CI/CD Security Pipeline - SHOP-BAN-DO-AN-NHANH
# GitLab repo: https://gitlab.com/nguyen-thanh-nam1/test1
# ================================================================
# Pipeline 6 stages:
#   1. secrets     → Gitleaks phát hiện credentials bị lộ
#   2. sast        → Semgrep phân tích tĩnh (OWASP Top 10)
#   3. dependency  → Trivy + npm audit quét CVE
#   4. sbom        → CycloneDX tạo Software Bill of Materials
#   5. container   → Build + Trivy quét Docker image
#   6. sign        → Cosign ký image (chỉ main/master)
# ================================================================

stages:
  - secrets
  - sast
  - dependency
  - sbom
  - container
  - sign

# ================================================================
# Global variables
# ================================================================
variables:
  # Docker image names (GitLab Container Registry)
  BACKEND_IMAGE:  "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA"
  FRONTEND_IMAGE: "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA"

  # Trivy
  TRIVY_NO_PROGRESS: "true"
  TRIVY_CACHE_DIR:   ".trivy-cache"

  # Docker — dùng socket mounting (không cần privileged/DinD)
  # Runner đã mount: /var/run/docker.sock:/var/run/docker.sock
  DOCKER_HOST: "unix:///var/run/docker.sock"

  # Tắt telemetry
  NEXT_TELEMETRY_DISABLED: "1"

# ================================================================
# STAGE 1: SECRETS — Gitleaks
# ================================================================
gitleaks:
  stage: secrets
  image:
    name: zricethezav/gitleaks:v8.20.1
    entrypoint: [""]
  allow_failure: false
  script:
    - echo "🔍 Gitleaks — quét secrets bị lộ trong git history..."
    - gitleaks detect
        --source .
        --config .gitleaks.toml
        --report-format json
        --report-path gitleaks-report.json
        --exit-code 1
        --verbose
        || (echo "❌ PHÁT HIỆN SECRETS! Xem report bên dưới:" && cat gitleaks-report.json && exit 1)
    - echo "✅ Không phát hiện secrets bị lộ!"
  after_script:
    - |
      if [ -f gitleaks-report.json ]; then
        COUNT=$(python3 -c "import json; d=json.load(open('gitleaks-report.json')); print(len(d) if isinstance(d,list) else 0)" 2>/dev/null || echo "?")
        echo "📊 Gitleaks findings: $COUNT"
      fi
  artifacts:
    name: "gitleaks-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - gitleaks-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ================================================================
# STAGE 2: SAST — Semgrep
# ================================================================
semgrep:
  stage: sast
  image: semgrep/semgrep:1.87.0
  allow_failure: false
  needs:
    - job: gitleaks
      optional: true
  script:
    - echo "🔍 Semgrep SAST — phân tích tĩnh mã nguồn..."
    - echo "Rules custom + owasp-top-ten + nodejs + secrets"
    # Chạy scan và xuất kết quả ra file JSON
    - semgrep scan --config .semgrep.yml --config "p/owasp-top-ten" --config "p/nodejs" --config "p/secrets" --json --output semgrep-report.json --metrics=off backend/src/ || true
    # Đọc kết quả đơn giản bằng python
    - python3 -c "import json, sys; data=json.load(open('semgrep-report.json')); results=data.get('results', []); errors=[r for r in results if r.get('extra',{}).get('severity')=='ERROR']; print('Total findings:', len(results), '- Errors:', len(errors)); sys.exit(1 if errors else 0)"

  artifacts:
    name: "semgrep-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - semgrep-report.json
    reports:
      sast: semgrep-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ================================================================
# STAGE 3: DEPENDENCY — Trivy filesystem scan + npm audit
# ================================================================

# Job 3a: Trivy quét filesystem (không cần Docker)
trivy-fs:
  stage: dependency
  image:
    name: aquasec/trivy:0.57.1
    entrypoint: [""]
  allow_failure: false
  needs: []
  cache:
    key: trivy-db
    paths:
      - .trivy-cache/
    policy: pull-push
  script:
    - echo "🔍 Trivy — quét vulnerabilities trong source code & dependencies..."
    - trivy --version

    # Cập nhật vulnerability DB
    - trivy image --download-db-only --cache-dir .trivy-cache || true

    # Quét backend
    - echo "=== BACKEND ==="
    - trivy fs
        --scanners vuln,secret
        --severity CRITICAL,HIGH,MEDIUM
        --format json
        --output trivy-backend.json
        --cache-dir .trivy-cache
        --exit-code 0
        ./backend/

    # Quét frontend
    - echo "=== FRONTEND ==="
    - trivy fs
        --scanners vuln,secret
        --severity CRITICAL,HIGH,MEDIUM
        --format json
        --output trivy-frontend.json
        --cache-dir .trivy-cache
        --exit-code 0
        ./frontend/

    # Phân tích kết quả quét bảo mật bằng python
    - python3 -c "import json, sys; total_crit=0;
      d1=json.load(open('trivy-backend.json')) if open('trivy-backend.json') else {};
      d2=json.load(open('trivy-frontend.json')) if open('trivy-frontend.json') else {};
      c1=sum(len(r.get('Vulnerabilities', [])) for r in d1.get('Results', []) if r.get('Vulnerabilities'));
      c2=sum(len(r.get('Vulnerabilities', [])) for r in d2.get('Results', []) if r.get('Vulnerabilities'));
      print('Backend vulnerabilities:', c1, '- Frontend vulnerabilities:', c2);
      "

    # Tạo HTML report
    - trivy fs --format template --template "@contrib/html.tpl"
        --output trivy-backend.html --cache-dir .trivy-cache ./backend/ || true
    - trivy fs --format template --template "@contrib/html.tpl"
        --output trivy-frontend.html --cache-dir .trivy-cache ./frontend/ || true

  artifacts:
    name: "trivy-fs-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - trivy-backend.json
      - trivy-frontend.json
      - trivy-backend.html
      - trivy-frontend.html
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Job 3b: npm audit (chạy song song)
npm-audit:
  stage: dependency
  image: node:20-alpine
  allow_failure: true
  needs: []
  script:
    - echo "🔍 npm audit — quét vulnerable packages..."

    # Backend
    - echo "=== BACKEND npm audit ==="
    - cd backend
    - npm install --ignore-scripts --legacy-peer-deps --silent 2>/dev/null || true
    - npm audit --json > ../npm-audit-backend.json 2>&1 || true
    - npm audit --audit-level=high 2>&1 || echo "⚠️  Backend có high/critical vulnerabilities!"
    - cd ..

    # Frontend
    - echo "=== FRONTEND npm audit ==="
    - cd frontend
    - npm install --ignore-scripts --legacy-peer-deps --silent 2>/dev/null || true
    - npm audit --json > ../npm-audit-frontend.json 2>&1 || true
    - npm audit --audit-level=high 2>&1 || echo "⚠️  Frontend có high/critical vulnerabilities!"
    - cd ..

    - echo "✅ npm audit hoàn thành!"
  artifacts:
    name: "npm-audit-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - npm-audit-backend.json
      - npm-audit-frontend.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ================================================================
# STAGE 4: SBOM — CycloneDX
# ================================================================
sbom:
  stage: sbom
  image: node:20-alpine
  allow_failure: true
  needs:
    - job: trivy-fs
      optional: true
    - job: npm-audit
      optional: true
  before_script:
    - npm install -g @cyclonedx/cdxgen@10.10.6 --silent
  script:
    - echo "📋 CycloneDX — tạo Software Bill of Materials..."
    - cdxgen --version

    # SBOM cho backend
    - echo "=== SBOM Backend ==="
    - cd backend
    - npm install --ignore-scripts --legacy-peer-deps --silent 2>/dev/null || true
    - cdxgen
        --type nodejs
        --output ../sbom-backend.json
        --format json
        --spec-version 1.6
        --project-name "shopbandoannhanh-backend"
        --project-version "$CI_COMMIT_SHORT_SHA"
        . || echo "SBOM backend generation failed (non-fatal)"
    - cd ..

    # SBOM cho frontend
    - echo "=== SBOM Frontend ==="
    - cd frontend
    - npm install --ignore-scripts --legacy-peer-deps --silent 2>/dev/null || true
    - cdxgen
        --type nodejs
        --output ../sbom-frontend.json
        --format json
        --spec-version 1.6
        --project-name "shopbandoannhanh-frontend"
        --project-version "$CI_COMMIT_SHORT_SHA"
        . || echo "SBOM frontend generation failed (non-fatal)"
    - cd ..

    # In kết quả phân tích SBOM bằng python
    - python3 -c "import json;
      d1=json.load(open('sbom-backend.json')) if open('sbom-backend.json') else {};
      d2=json.load(open('sbom-frontend.json')) if open('sbom-frontend.json') else {};
      print('Backend SBOM components:', len(d1.get('components', [])));
      print('Frontend SBOM components:', len(d2.get('components', [])));"
    - echo "✅ SBOM generation hoàn thành!"

  artifacts:
    name: "sbom-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 90 days
    paths:
      - sbom-backend.json
      - sbom-frontend.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ================================================================
# STAGE 5: CONTAINER — Build + Trivy image scan
# ================================================================
build-scan-backend:
  stage: container
  image: docker:27
  allow_failure: false
  needs:
    - job: sbom
      optional: true
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🐳 Build backend Docker image..."
    - docker build --tag "$BACKEND_IMAGE" --label "git.commit=$CI_COMMIT_SHA" --label "git.branch=$CI_COMMIT_REF_NAME" --label "pipeline.id=$CI_PIPELINE_ID" ./backend/
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$CI_PROJECT_DIR/.trivy-cache:/root/.cache/" aquasec/trivy:0.57.1 image --exit-code 0 --severity CRITICAL,HIGH --format json --output /tmp/trivy-image-backend.json "$BACKEND_IMAGE" || true
    - cp /tmp/trivy-image-backend.json trivy-image-backend.json 2>/dev/null || echo '{}' > trivy-image-backend.json
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image --exit-code 1 --severity CRITICAL --quiet "$BACKEND_IMAGE"
    - docker push "$BACKEND_IMAGE"
    - echo "✅ Backend image pushed"
  artifacts:
    name: "trivy-image-backend-$CI_COMMIT_SHORT_SHA"
    when: always
    expire_in: 30 days
    paths:
      - trivy-image-backend.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

build-scan-frontend:
  stage: container
  image: docker:27
  allow_failure: false
  needs:
    - job: sbom
      optional: true
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🐳 Build frontend Docker image..."
    - docker build --tag "$FRONTEND_IMAGE" --label "git.commit=$CI_COMMIT_SHA" --build-arg NEXT_PUBLIC_API_URL="http://localhost:4000/api" ./frontend/
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.57.1 image --exit-code 1 --severity CRITICAL --quiet "$FRONTEND_IMAGE"
    - docker push "$FRONTEND_IMAGE"
    - echo "✅ Frontend image pushed"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'

# ================================================================
# STAGE 6: SIGN — Cosign/Sigstore (chỉ main/master)
# ================================================================
cosign-sign:
  stage: sign
  image: docker:27
  # Không cần DinD
  allow_failure: true
  needs:
    - job: build-scan-backend
      optional: false
  before_script:
    - apk add --no-cache curl
    - curl -sSfL "https://github.com/sigstore/cosign/releases/download/v2.4.1/cosign-linux-amd64" -o /usr/local/bin/cosign
    - chmod +x /usr/local/bin/cosign
    - cosign version
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - echo "🔏 Cosign — ký Docker image với Sigstore keyless..."
    # Ký bằng OIDC token
    - COSIGN_EXPERIMENTAL=1 cosign sign --yes --annotations "git.commit=$CI_COMMIT_SHA" --annotations "git.branch=$CI_COMMIT_REF_NAME" --annotations "pipeline=$CI_PIPELINE_ID" --annotations "signer=gitlab-ci/cosign" "$BACKEND_IMAGE"
    # Xác thực lại
    - echo "✅ Verify chữ ký..."
    - COSIGN_EXPERIMENTAL=1 cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer "https://gitlab.com" "$BACKEND_IMAGE"
    # Xuất thông tin
    - echo '{"image":"'"$BACKEND_IMAGE"'", "signed":true, "pipeline":"'"$CI_PIPELINE_ID"'"}' > signing-info.json
    - cat signing-info.json
    - echo "🎉 Image đã được ký và ghi vào Rekor transparency log!"

  artifacts:
    name: "signing-info-$CI_COMMIT_SHORT_SHA"
    when: on_success
    expire_in: 90 days
    paths:
      - signing-info.json
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'

# ================================================================
# Summary job (luôn chạy)
# ================================================================
pipeline-summary:
  stage: sign
  image: alpine:3.20
  allow_failure: true
  when: always
  needs:
    - job: gitleaks
      optional: true
    - job: semgrep
      optional: true
    - job: trivy-fs
      optional: true
    - job: npm-audit
      optional: true
    - job: sbom
      optional: true
  script:
    - echo "=================================================="
    - echo "SECURITY PIPELINE SUMMARY"
    - echo "Project:$CI_PROJECT_NAME - Branch:$CI_COMMIT_REF_NAME"
    - echo "Commit:$CI_COMMIT_SHORT_SHA - Pipeline:#$CI_PIPELINE_ID"
    - echo "Artifacts:Gitleaks, Semgrep, Trivy, SBOM, Signing"
    - echo "=================================================="
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
